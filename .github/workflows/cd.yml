name: CD — ShopSense AI

on:
  workflow_run:
    workflows: ["CI — ShopSense AI"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    name: Deploy to GCP Cloud Run
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    env:
      PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      REGION: asia-south1
      REPO: shopsense-repo
      SERVICE: shopsense-ai-backend
      IMAGE: asia-south1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/shopsense-repo/shopsense-ai

    steps:
      # Step 1: Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Authenticate to GCP
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # Step 3: Setup gcloud CLI
      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      # Step 4: Configure Docker for Artifact Registry
      - name: Configure Docker
        run: |
          gcloud auth configure-docker asia-south1-docker.pkg.dev --quiet

      # Step 5: Build Docker image
      - name: Build Docker image
        run: |
          docker build -t ${{ env.IMAGE }}:${{ github.sha }} .
          docker tag ${{ env.IMAGE }}:${{ github.sha }} ${{ env.IMAGE }}:latest
          echo "Docker build complete"

      # Step 6: Push to Artifact Registry
      - name: Push to Artifact Registry
        run: |
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest
          echo "Image pushed to Artifact Registry"

      # Step 7: Deploy to Cloud Run
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image ${{ env.IMAGE }}:${{ github.sha }} \
            --platform managed \
            --region ${{ env.REGION }} \
            --allow-unauthenticated \
            --port 8000 \
            --memory 2Gi \
            --cpu 2 \
            --timeout 300 \
            --max-instances 3 \
            --set-env-vars="GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" \
            --set-env-vars="SERPAPI_KEY=${{ secrets.SERPAPI_KEY }}" \
            --set-env-vars="PINECONE_API_KEY=${{ secrets.PINECONE_API_KEY }}" \
            --set-env-vars="PINECONE_INDEX_NAME=${{ secrets.PINECONE_INDEX_NAME }}" \
            --set-env-vars="DATABASE_URL=${{ secrets.DATABASE_URL }}" \
            --set-env-vars="SUPABASE_URL=${{ secrets.SUPABASE_URL }}" \
            --set-env-vars="SUPABASE_KEY=${{ secrets.SUPABASE_KEY }}" \
            --set-env-vars="LANGCHAIN_API_KEY=${{ secrets.LANGCHAIN_API_KEY }}" \
            --set-env-vars="LANGCHAIN_TRACING_V2=true" \
            --set-env-vars="LANGCHAIN_ENDPOINT=https://api.smith.langchain.com" \
            --set-env-vars="LANGCHAIN_PROJECT=shopsense-ai"

      # Step 8: Get Cloud Run URL
      - name: Get deployment URL
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE }} \
            --platform managed \
            --region ${{ env.REGION }} \
            --format 'value(status.url)')
          echo "Backend URL: $URL"
          echo "BACKEND_URL=$URL" >> $GITHUB_ENV

      # Step 9: Health Check
      - name: Health Check
        run: |
          echo "Waiting 30 seconds for service to start..."
          sleep 30
          curl -f ${{ env.BACKEND_URL }}/health && echo "Health check passed"

      - name: Deployment Complete
        run: |
          echo "ShopSense AI deployed successfully"
          echo "URL: ${{ env.BACKEND_URL }}"