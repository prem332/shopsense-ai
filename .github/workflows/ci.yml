name: CI — ShopSense AI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test Backend
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Setup Python
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Step 3: Cache pip packages
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # Step 4: Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Step 5: Check imports work
      - name: Check Python imports
        run: |
          python -c "import fastapi; print('FastAPI OK')"
          python -c "import langchain; print('LangChain OK')"
          python -c "import langgraph; print('LangGraph OK')"
          python -c "import pinecone; print('Pinecone OK')"
          python -c "import langchain_google_genai; print('Gemini OK')"
          python -c "from app.backend.main import app; print('App imports OK')"
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
          PINECONE_INDEX_NAME: ${{ secrets.PINECONE_INDEX_NAME }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          LANGCHAIN_API_KEY: ${{ secrets.LANGCHAIN_API_KEY }}
          LANGCHAIN_TRACING_V2: "false"
          PYTHONPATH: ${{ github.workspace }}

      # Step 6: Check Dockerfile exists
      - name: Verify Dockerfile
        run: |
          test -f Dockerfile && echo "Dockerfile exists OK"
          test -f start_servers_prod.sh && echo "start_servers_prod.sh exists OK"
          test -f requirements.txt && echo "requirements.txt exists OK"

      # Step 7: Build Docker image (no push)
      - name: Build Docker image
        run: |
          docker build -t shopsense-ai:test .
          echo "Docker build OK"

      - name: CI Passed
        run: echo "All CI checks passed. Ready for deployment!"